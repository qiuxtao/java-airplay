@accentColor = #6B7CFF
Component.arc = 14
Component.minimumWidth = 72
Button.arc = 12
Button.minimumHeight = 36
TextComponent.arc = 12
TextComponent.minimumHeight = 36
ProgressBar.arc = 999
ScrollBar.thumbArc = 999
