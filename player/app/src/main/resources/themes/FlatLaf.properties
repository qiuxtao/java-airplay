[light]Panel.background = #F2F5FC
[light]TitlePane.background = #F8FAFF
[light]Button.background = #FFFFFF
[light]Button.hoverBackground = #E8EDFF
[light]TextField.background = #FFFFFF
[light]ComboBox.background = #FFFFFF
