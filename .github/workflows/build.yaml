name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew test --console=plain

  windows-package:
    runs-on: windows-2022
    env:
      GSTREAMER_VERSION: 1.28.5
      GSTREAMER_SHA256: 51ee5eaec33008e8409d8cf6f6884457f22aa3bd515f8856f993a3eaab903530
      WINDOWS_SIGNING_KEY_USER: ${{ secrets.WINDOWS_SIGNING_KEY_USER }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - name: Cache GStreamer installer
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\gstreamer-installer.exe
          key: gstreamer-msvc-x64-${{ env.GSTREAMER_VERSION }}
      - name: Download and stage GStreamer
        shell: pwsh
        run: |
          $installer = Join-Path $env:RUNNER_TEMP 'gstreamer-installer.exe'
          $runtime = Join-Path $env:RUNNER_TEMP 'gstreamer-runtime'
          if (!(Test-Path $installer)) {
            Invoke-WebRequest -UseBasicParsing -OutFile $installer "https://gstreamer.freedesktop.org/pkg/windows/$env:GSTREAMER_VERSION/msvc/gstreamer-1.0-msvc-x86_64-$env:GSTREAMER_VERSION.exe"
          }
          $hash = (Get-FileHash -Algorithm SHA256 $installer).Hash.ToLowerInvariant()
          if ($hash -ne $env:GSTREAMER_SHA256) { throw "Unexpected GStreamer checksum: $hash" }
          $process = Start-Process -FilePath $installer -Wait -PassThru -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/CURRENTUSER',"/DIR=$runtime"
          if ($process.ExitCode -ne 0) { throw "GStreamer installer failed with exit code $($process.ExitCode)" }
          $gstreamerDll = Get-ChildItem $runtime -Recurse -Filter 'gstreamer-1.0-0.dll' | Select-Object -First 1
          if (!$gstreamerDll) {
            $gstreamerDll = Get-ChildItem $runtime -Recurse -Filter 'libgstreamer-1.0-0.dll' | Select-Object -First 1
          }
          if (!$gstreamerDll) { throw 'The staged GStreamer runtime does not contain its core DLL' }
          $runtimeRoot = $gstreamerDll.Directory.Parent.FullName
          "GSTREAMER_RUNTIME_DIR=$runtimeRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Test and stage app image
        shell: pwsh
        run: |
          .\gradlew.bat test :player:app:stageGStreamerRuntime --console=plain
          if ($LASTEXITCODE -ne 0) { throw "Gradle test/stage failed with exit code $LASTEXITCODE" }
          $runtimeFiles = Get-ChildItem '.\player\app\build\package\staged-image\AirPlay Receiver\gstreamer' -File -Recurse
          $runtimeBytes = ($runtimeFiles | Measure-Object -Property Length -Sum).Sum
          "Pruned GStreamer runtime: $($runtimeFiles.Count) files, $([math]::Round($runtimeBytes / 1MB, 1)) MiB" | Write-Host
          if ($runtimeBytes -gt 80MB) { throw 'Pruned GStreamer runtime exceeded the 80 MiB packaging limit' }
      - name: Verify pruned media runtime
        shell: pwsh
        run: |
          $gstRoot = (Resolve-Path '.\player\app\build\package\staged-image\AirPlay Receiver\gstreamer').Path
          $env:PATH = "$gstRoot\bin;$env:PATH"
          $env:GST_PLUGIN_PATH = "$gstRoot\lib\gstreamer-1.0"
          $env:GST_PLUGIN_PATH_1_0 = $env:GST_PLUGIN_PATH
          $env:GST_REGISTRY_1_0 = Join-Path $env:RUNNER_TEMP 'airplay-pruned-gstreamer-registry.bin'
          $elements = @(
            'appsrc', 'appsink', 'h264parse', 'avdec_h264', 'videoconvert',
            'avdec_alac', 'avdec_aac', 'audioconvert', 'audioresample',
            'volume', 'autoaudiosink', 'wasapisink', 'wasapi2sink'
          )
          foreach ($element in $elements) {
            $inspection = & "$gstRoot\bin\gst-inspect-1.0.exe" $element 2>&1
            if ($LASTEXITCODE -ne 0) {
              throw "GStreamer element '$element' failed to load: $($inspection -join [Environment]::NewLine)"
            }
          }
      - name: Verify app image
        shell: pwsh
        run: |
          $appImage = '.\player\app\build\package\staged-image\AirPlay Receiver\AirPlay Receiver.exe'
          $selfTest = Start-Process -FilePath $appImage -Wait -PassThru -ArgumentList '--self-test'
          if ($selfTest.ExitCode -ne 0) { throw "app-image self-test failed with exit code $($selfTest.ExitCode)" }
      - name: Build Windows installer
        shell: pwsh
        run: |
          .\gradlew.bat :player:app:signWindowsPackage --console=plain
          if ($LASTEXITCODE -ne 0) { throw "Gradle packaging failed with exit code $LASTEXITCODE" }
      - name: Install Windows package
        shell: pwsh
        run: |
          $installers = @(Get-ChildItem '.\player\app\build\package\installer\*.exe')
          if ($installers.Count -ne 1) { throw "Expected one Windows installer, found $($installers.Count)" }
          $installer = $installers[0]
          "Windows installer: $([math]::Round($installer.Length / 1MB, 1)) MiB" | Write-Host
          if ($installer.Length -gt 300MB) { throw 'Windows installer exceeded the 300 MiB packaging limit' }
          $install = Start-Process -FilePath $installer.FullName -Wait -PassThru -ArgumentList '/quiet','/norestart'
          if ($install.ExitCode -ne 0) {
            Write-Host "::error title=Installer smoke test failed::Installer exit code $($install.ExitCode)"
            throw "Installer smoke test failed with exit code $($install.ExitCode)"
          }
          $versionMatch = Select-String -Path '.\build.gradle' -Pattern "version = '([^']+)'"
          $expectedVersion = $versionMatch.Matches[0].Groups[1].Value
          $expectedDisplayName = "AirPlay Receiver $expectedVersion"
          $uninstallRoots = @(
            'HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall',
            'HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall',
            'HKLM:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall'
          )
          $installedEntry = $uninstallRoots |
            Where-Object { Test-Path $_ } |
            ForEach-Object { Get-ChildItem $_ | Get-ItemProperty } |
            Where-Object { $_.DisplayName -eq $expectedDisplayName } |
            Select-Object -First 1
          if (!$installedEntry) {
            $airPlayEntries = $uninstallRoots |
              Where-Object { Test-Path $_ } |
              ForEach-Object { Get-ChildItem $_ | Get-ItemProperty } |
              Where-Object { $_.DisplayName -like '*AirPlay*' } |
              ForEach-Object { "$($_.DisplayName) [$($_.DisplayVersion)]" }
            $actualEntries = $airPlayEntries -join '; '
            Write-Host "::error title=Control Panel name mismatch::Expected '$expectedDisplayName'; found '$actualEntries'"
            throw "Control Panel entry '$expectedDisplayName' was not registered"
          }
          if ($installedEntry.DisplayVersion -ne $expectedVersion) {
            throw "Unexpected installed version: $($installedEntry.DisplayVersion)"
          }
      - name: Verify installed application
        shell: pwsh
        run: |
          $installedApp = Join-Path $env:LOCALAPPDATA 'AirPlay Receiver App\AirPlay Receiver.exe'
          if (!(Test-Path $installedApp)) { throw "Installed application not found at $installedApp" }
          $installedSelfTest = Start-Process -FilePath $installedApp -Wait -PassThru -ArgumentList '--self-test'
          if ($installedSelfTest.ExitCode -ne 0) { throw "Installed self-test failed with exit code $($installedSelfTest.ExitCode)" }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: airplay-receiver-windows-x64
          path: player/app/build/package/installer/*.exe
          if-no-files-found: error
